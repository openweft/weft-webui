name: Release

# Tag-driven publish. Pushes to GHCR happen ONLY on a vX.Y.Z tag,
# not on every push to main (project memory : "No autopublish during dev").

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (defaults to the current branch).'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/openweft/weft-webui
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      # The webui Dockerfile bundles its own SPA build stage ; nothing
      # to vendor or pre-stage — the go.mod has no local replaces
      # (commit f5ff668 dropped them).
      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version
        id: stamps
        run: echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

      - name: Build + push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.stamps.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.stamps.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
