name: Release

# Tag-driven publish. Pushes to GHCR happen ONLY on a vX.Y.Z tag,
# not on every push to main (project memory : "No autopublish during dev").
#
# Supply-chain attestations: each pushed image gets an SPDX 2.3 JSON
# SBOM (Syft) cosign-attested as `spdxjson`, plus a SLSA L3 provenance
# via slsa-framework/slsa-github-generator. See the weft repo's
# docs/operations/cosign-verify.md for verifier commands.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build from (defaults to the current branch).'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # id-token: write is required for keyless cosign + SLSA generator
      # OIDC exchange. contents:read inherited from the job-level
      # default.
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ env.IMAGE }}
      digest: ${{ steps.build.outputs.digest }}
    env:
      IMAGE: ghcr.io/openweft/weft-webui
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      # The webui Dockerfile bundles its own SPA build stage ; nothing
      # to vendor or pre-stage — the go.mod has no local replaces
      # (commit f5ff668 dropped them).
      - name: Set up QEMU (riscv64 + loong64 binfmt)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64,riscv64,loong64

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version + SOURCE_DATE_EPOCH
        id: stamps
        run: |
          set -euo pipefail
          echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
          # Canonical reproducible-builds.org convention : commit
          # timestamp of the build ref. buildkit (>= 0.11) honours
          # the env var natively by rewriting layer mtimes + image
          # config `created`. The Dockerfile can additionally read
          # the build-arg to feed `go build -buildvcs=false
          # -ldflags=-buildid=...` inside its build stage ; that
          # part lives in the Dockerfile (out of this workflow's
          # scope) — see docs/operations/reproducible-builds.md.
          echo "epoch=$(git log -1 --format=%ct "${GITHUB_SHA}")" >> "$GITHUB_OUTPUT"

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v7
        env:
          SOURCE_DATE_EPOCH: ${{ steps.stamps.outputs.epoch }}
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/riscv64,linux/loong64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:${{ steps.stamps.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            VERSION=${{ steps.stamps.outputs.version }}
            SOURCE_DATE_EPOCH=${{ steps.stamps.outputs.epoch }}
          # GHA cache disabled : a stale layer from the pre-multi-page
          # Vite refactor was poisoning subsequent builds with a
          # corrupted web/dist tree (web bundle without portal index
          # files). Cold-build trades ~3 min for reliability.

      - uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image (keyless)
        # Sign the multi-arch manifest digest so the signature stays
        # bound to the bytes even if the tag is later moved.
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - uses: anchore/sbom-action/download-syft@v0

      - name: Generate image SBOM (SPDX 2.3 JSON)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          syft scan "registry:${IMAGE}@${DIGEST}" \
            -o spdx-json=weft-webui.spdx.json

      - name: Cosign-attest SBOM (spdxjson predicate)
        # Binds the SBOM to the image digest as an in-toto attestation.
        # Consumers verify with `cosign verify-attestation --type spdxjson ...`.
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          cosign attest --yes \
            --predicate weft-webui.spdx.json \
            --type spdxjson \
            "${IMAGE}@${DIGEST}"

      - name: Upload SBOM as workflow artifact
        # No GitHub Release object is created by this workflow (image-only
        # publish), so park the SBOM as a workflow artifact for forensic
        # recall. Verifiers should prefer the cosign attestation above.
        uses: actions/upload-artifact@v7
        with:
          name: weft-webui-sbom-${{ steps.stamps.outputs.version }}
          path: weft-webui.spdx.json

  provenance:
    # SLSA L3 provenance for the published image. Runs on an isolated
    # ephemeral builder GitHub controls — that's what earns L3 builder
    # identity. Produces an in-toto attestation attached to the
    # registry manifest by digest.
    needs: publish
    permissions:
      contents: read
      packages: write
      id-token: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ghcr.io/openweft/weft-webui
      digest: ${{ needs.publish.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}
