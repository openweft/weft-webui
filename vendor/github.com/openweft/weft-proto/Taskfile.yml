version: '3'

tasks:
  build:
    desc: "Build (library — compile check only)"
    cmds:
      - go build -mod=mod ./...

  lint:
    desc: "Vet the package"
    cmds:
      - go vet -mod=mod ./...

  proto:
    desc: "Regenerate Go stubs from weft.proto (requires protoc)"
    cmds:
      - protoc --go_out=. --go-grpc_out=. --go_opt=paths=source_relative --go-grpc_opt=paths=source_relative weft.proto
