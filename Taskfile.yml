version: "3"

# weft-webui — Go backend (API + embedded SPA) + SvelteJS/DaisyUI frontend.

vars:
  BIN: weft-webui

tasks:
  install:
    desc: Install frontend dependencies
    dir: web
    cmds:
      - npm install

  gen-api:
    desc: Dump the OpenAPI spec + regenerate the TypeScript client (run after Go server changes)
    cmds:
      - go run ./tools/dump-openapi -o web/openapi.json -scope admin
      - cd web && npm run gen:api

  build-web:
    desc: Build the SvelteJS SPA into web/dist (embedded by the Go binary)
    deps: [gen-api]
    dir: web
    cmds:
      - npm run build

  build:
    desc: Build the frontend then the self-contained binary
    deps: [build-web]
    cmds:
      - go build -o {{.BIN}} .

  run:
    desc: Build the frontend and run on :8080 only (legacy single-listener — full surface)
    deps: [build-web]
    cmds:
      - go run . {{.CLI_ARGS}}

  run:dual:
    desc: Build + run user :8080 + tenant 127.0.0.1:8088 portals (dev mode, no auth)
    deps: [build-web]
    env:
      WEBUI_DEV_MODE: "true"
      WEBUI_TENANT_ADDR: "127.0.0.1:8088"
    cmds:
      - go run . {{.CLI_ARGS}}

  run:trio:
    desc: Build + run the three portals — user :8080, tenant :8088, infra :8089 (dev mode)
    deps: [build-web]
    env:
      WEBUI_DEV_MODE: "true"
      WEBUI_TENANT_ADDR: "127.0.0.1:8088"
      WEBUI_INFRA_ADDR: "127.0.0.1:8089"
    cmds:
      - go run . {{.CLI_ARGS}}

  dev:api:
    desc: Run only the Go API on :8080 (legacy single-listener — no SPA build)
    cmds:
      - go run . {{.CLI_ARGS}}

  dev:api:dual:
    desc: API-only dev with BOTH listeners (user :8080, tenant 127.0.0.1:8088)
    env:
      WEBUI_DEV_MODE: "true"
      WEBUI_TENANT_ADDR: "127.0.0.1:8088"
    cmds:
      - go run . {{.CLI_ARGS}}

  dev:api:trio:
    desc: API-only dev with all three portals (user/tenant/infra)
    env:
      WEBUI_DEV_MODE: "true"
      WEBUI_TENANT_ADDR: "127.0.0.1:8088"
      WEBUI_INFRA_ADDR: "127.0.0.1:8089"
    cmds:
      - go run . {{.CLI_ARGS}}

  dev:web:
    desc: Run the Vite dev server on :5173 (proxies /api to :8080)
    dir: web
    cmds:
      - npm run dev

  check:
    desc: Vet Go + type-check Svelte + run unit tests (regenerates the typed client first)
    deps: [gen-api]
    cmds:
      - go vet ./...
      - cd web && npm run check
      - cd web && npm run test

  test:web:
    desc: Frontend unit tests only (Vitest)
    dir: web
    cmds:
      - npm run test

  check:drift:
    desc: Fail when the committed OpenAPI snapshot + typed client are stale
    deps: [gen-api]
    cmds:
      # Tracked files only — non-tracked artifacts (vendored modules, etc)
      # are explicitly excluded. Exit code is what matters ; the diff body
      # is informational for whoever reads the CI log.
      - |
        if ! git diff --quiet -- web/openapi.json web/src/lib/api.gen.ts ; then
          echo "✗ Generated files drifted from internal/server/api_*.go" >&2
          git --no-pager diff --stat -- web/openapi.json web/src/lib/api.gen.ts >&2
          echo "" >&2
          echo "  Run 'task gen-api' and commit the result." >&2
          exit 1
        fi
        echo "✓ web/openapi.json + web/src/lib/api.gen.ts are in sync with the Go handlers."

  oidc-smoke:
    desc: |
      Drive the canonical OIDC Authorization Code flow end-to-end against
      a running weft-webui + Dex (operator drill — NOT a CI gate).
      Prereqs : weft-webui running on $WEBUI_BASE (default http://localhost:8080),
      Dex reachable at $DEX_ISSUER (default http://localhost:5556/dex) with
      its mock connector enabled. Override creds via $OIDC_USER / $OIDC_PASS
      (defaults admin@example.com / password). Exits non-zero on any step
      failure ; see docs/operations/oidc-smoke-test.md for troubleshooting.
    cmds:
      - go run ./tools/oidc-smoke {{.CLI_ARGS}}

  clean:
    cmds:
      - rm -rf {{.BIN}} web/dist
