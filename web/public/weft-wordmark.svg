<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 128" role="img" aria-label="Weft">
  <title>Weft — horizontal lockup</title>
  <!--
    Lockup horizontal : icône A (trame sur chaîne) à 96×96 à gauche,
    wordmark "Weft" à droite, baseline alignée. L'icône est redessinée
    inline (mêmes proportions que weft-A-weave.svg, transposée dans le
    viewBox 480×128) pour rester un seul fichier autonome — pas de
    <use href="…"> qui casserait quand le SVG est inliné.

    Police : Inter en priorité (utilisée par la landing), fallback
    system-ui pour rester lisible si Inter n'est pas chargé. Quand la
    fonte définitive sera figée, sortir "Weft" en paths via Inkscape /
    fontTools pour zero font dependency.
  -->
  <g transform="translate(16,16) scale(0.375)">
    <line x1="68"  y1="40" x2="68"  y2="216" stroke="#172445" stroke-width="22" stroke-linecap="round"/>
    <line x1="188" y1="40" x2="188" y2="216" stroke="#172445" stroke-width="22" stroke-linecap="round"/>
    <line x1="36"  y1="128" x2="220" y2="128" stroke="#2563eb" stroke-width="22" stroke-linecap="round"/>
    <line x1="128" y1="40" x2="128" y2="216" stroke="#172445" stroke-width="22" stroke-linecap="round"/>
  </g>
  <text x="136" y="92"
        font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="88" font-weight="700" letter-spacing="-2"
        fill="#172445">Weft</text>
</svg>
