<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Weft logo A — woven weft over warp">
  <title>Weft logo A — woven weft over warp</title>
  <!--
    Direction A : la trame (weft) tissée à travers la chaîne (warp).
    Trois fils verticaux (chaîne) + un fil horizontal (trame) qui passe
    devant le 1er, derrière le 2e, devant le 3e. Le contraste créé par
    l'ordre de tracé (warp[1,3] -> weft -> warp[2]) suffit à donner
    l'illusion "dessus/dessous" sans masque ni clipPath.
  -->
  <g fill="none" stroke-linecap="round">
    <!-- chaîne externes : tracées EN DESSOUS de la trame -->
    <line x1="68"  y1="40" x2="68"  y2="216" stroke="#172445" stroke-width="22"/>
    <line x1="188" y1="40" x2="188" y2="216" stroke="#172445" stroke-width="22"/>
    <!-- trame : passe par-dessus les deux extrêmes, mais sera masquée par le brin central -->
    <line x1="36"  y1="128" x2="220" y2="128" stroke="#2563eb" stroke-width="22"/>
    <!-- chaîne centrale : tracée DERNIER → recouvre la trame -->
    <line x1="128" y1="40" x2="128" y2="216" stroke="#172445" stroke-width="22"/>
  </g>
</svg>
